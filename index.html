<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Registro de Pesos</title>
    <style>
      body {
        font-family: Segoe UI;
        margin: 0;
        background: #f4f6f9;
      }

      header {
        background: #1e3c72;
        color: white;
        padding: 20px;
        text-align: center;
        font-size: 22px;
        position: relative;
      }

      .logo {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        height: 50px;
      }

      .codigo-empresa {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 14px;
        font-weight: 500;
      }

      .container {
        max-width: 1200px;
        margin: 20px auto;
        padding: 20px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        margin-bottom: 20px;
      }

      input,
      select {
        width: 100%;
        padding: 8px;
        margin: 5px 0;
        border-radius: 6px;
        border: 1px solid #ddd;
      }

      button {
        background: #2a5298;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #1e3c72;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      th {
        background: #2a5298;
        color: white;
        padding: 6px;
      }

      td {
        padding: 6px;
        border-bottom: 1px solid #eee;
      }

      .success {
        color: green;
        font-weight: bold;
      }

      .hidden {
        display: none;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body>
    <header>
      <img src="https://raw.githubusercontent.com/eduardoletelier1116-blip/app-pesaje-manzana/main/fondo-blanco.jpg" class="logo" alt="Fresh-Pak">
      Registro de Pesos
      <div class="codigo-empresa">R02 POE 29</div>
    </header>

    <div class="container">
      <div class="card" id="loginCard">
        <h3>Ingreso</h3>
        <input type="text" id="nombreOperador" placeholder="Nombre operador">
        <input type="password" id="claveOperador" placeholder="Clave operador">
        <button onclick="ingresarOperador()">Operador</button>
        <p id="msgLogin" style="color:red;"></p>
      </div>

      <div class="card hidden" id="formCard">
        <h3>Nuevo Registro</h3>
        <form id="form">
          <input type="text" id="operador" readonly>
          <select id="exportadora" required>
            <option value="">Exportadora</option>
            <option>Fruclem</option>
            <option>SK Gyan</option>
            <option>JHB</option>
            <option>Talamaya</option>
          </select>
          <select id="categoria" required>
            <option value="">Categoría</option>
            <option>Premium</option>
            <option>Extra</option>
            <option>Fancy</option>
            <option>Choice</option>
            <option>Granel</option>
          </select>
          <select id="variedad" required>
            <option value="">Variedad</option>
            <option>Royal Gala</option>
            <option>Red Delicious</option>
            <option>Granny</option>
            <option>Fuji</option>
            <option>Pink Lady</option>
          </select>
          <select id="salida" required>
            <option value="">Salida</option>
          </select>
          <input type="text" id="calibre" placeholder="Calibre" required>
          <input type="text" id="lote" placeholder="Lote">
          <input type="number" step="0.01" id="peso" placeholder="Peso (kg)" required>
          <button type="submit">Guardar</button>
          <p id="msg" class="success"></p>
        </form>
      </div>

      <div class="card" id="registrosCard">
        <h3>Registros</h3>
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Hora</th>
              <th>Usuario</th>
              <th>Exportadora</th>
              <th>Salida</th>
              <th>Calibre</th>
              <th>Categoria</th>
              <th>Variedad</th>
              <th>Lote</th>
              <th>Peso</th>
            </tr>
          </thead>
          <tbody id="tabla"></tbody>
        </table>
      </div>

      <div class="card" id="graficoCard">
        <h3>Progreso de Peso por Calibre</h3>
        <canvas id="graficoCalibres"></canvas>
      </div>
    </div>

    <script>
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwEWxdRCwj549evEfZ47u6m2uDKj08gAvKN5zlUd67axC9kbmOVrx-Xd3O7hCggPErL/exec";
      const salidaSelect = document.getElementById("salida");

      for (let i = 1; i <= 41; i++) {
        let option = document.createElement("option");
        option.value = i;
        option.text = i;
        salidaSelect.appendChild(option);
      }

      let nombreActual = "";
      let operadorData = {
        operador: "",
        exportadora: "",
        variedad: "",
        lote: ""
      };

      // Función de formateo de fecha
      function formatDate(date) {
        if (date instanceof Date) {
          const day = String(date.getDate()).padStart(2, '0');
          const month = String(date.getMonth() + 1).padStart(2, '0');
          const year = date.getFullYear();
          return `${year}-${month}-${day}`;
        }

        if (typeof date === 'string' && date.includes('/')) {
          const parts = date.split('/');
          const day = String(parts[0]).padStart(2, '0');
          const month = String(parts[1]).padStart(2, '0');
          const year = parts[2];
          return `${year}-${month}-${day}`;
        }
        return date;
      }

      function filtrarRegistrosPorDia(registros) {
        const hoy = new Date();
        const fechaHoy = formatDate(hoy); 

        return registros.filter(row => {
          const fechaRegistro = formatDate(row[0]); 
          return fechaRegistro === fechaHoy;
        });
      }

      function cargarRegistros() {
        fetch(SCRIPT_URL)
          .then(res => res.json())
          .then(data => {
            const tbody = document.getElementById("tabla");
            tbody.innerHTML = "";

            const registrosFiltrados = filtrarRegistrosPorDia(data);

            console.log("Datos de registros:", data);  // Agrega esta línea
            console.log("Registros filtrados para hoy:", registrosFiltrados);

            if (registrosFiltrados.length === 0) {
              tbody.innerHTML = `<tr><td colspan="10">No hay registros para hoy.</td></tr>`;
            } else {
              registrosFiltrados.reverse().forEach(row => {
                tbody.innerHTML += `
                  <tr>
                    <td>${row[0]}</td>
                    <td>${row[1]}</td>
                    <td>${row[2]}</td>
                    <td>${row[3]}</td>
                    <td>${row[4]}</td>
                    <td>${row[5]}</td>
                    <td>${row[6]}</td>
                    <td>${row[7]}</td>
                    <td>${row[8]}</td>
                    <td>${row[9]}</td>
                  </tr>
                `;
              });
            }

            const calibres = {};
            registrosFiltrados.forEach(row => {
              const calibre = row[5];
              const peso = parseFloat(row[9]);
              const fecha = formatDate(row[0]);

              if (!calibres[calibre]) {
                calibres[calibre] = {
                  label: calibre,
                  data: [],
                  borderColor: getRandomColor(),
                  backgroundColor: "rgba(0,0,0,0)",
                  fill: false,
                };
              }
              calibres[calibre].data.push({ x: fecha, y: peso });
            });

            console.log("Datos para gráfico:", calibres);  // Verifica los datos de calibres

            const chartData = {
              datasets: Object.values(calibres),
            };

            new Chart(document.getElementById("graficoCalibres"), {
              type: "line",
              data: chartData,
              options: {
                scales: {
                  x: {
                    type: "time",
                    time: {
                      unit: "day",
                      tooltipFormat: "ll",
                    },
                    title: {
                      display: true,
                      text: "Fecha",
                    },
                  },
                  y: {
                    ticks: {
                      beginAtZero: false,
                    },
                    title: {
                      display: true,
                      text: "Peso (kg)",
                    },
                  },
                },
                plugins: {
                  legend: {
                    position: "top",
                  },
                },
              },
            });
          })
          .catch(err => console.error("Error cargando registros:", err));
      }

      function getRandomColor() {
        const letters = "0123456789ABCDEF";
        let color = "#";
        for (let i = 0; i < 6; i++) {
          color += letters[Math.floor(Math.random() * 16)];
        }
        return color;
      }
    </script>
  </body>
</html>
