<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Registro de Pesos</title>
    <style>
      body {
        font-family: Segoe UI;
        margin: 0;
        background: #f4f6f9;
      }

      header {
        background: #1e3c72;
        color: white;
        padding: 20px;
        text-align: center;
        font-size: 22px;
        position: relative;
      }

      .logo {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        height: 50px;
      }

      .codigo-empresa {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 14px;
        font-weight: 500;
      }

      .container {
        max-width: 1200px;
        margin: 20px auto;
        padding: 20px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        margin-bottom: 20px;
      }

      input,
      select {
        width: 100%;
        padding: 8px;
        margin: 5px 0;
        border-radius: 6px;
        border: 1px solid #ddd;
      }

      button {
        background: #2a5298;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #1e3c72;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      th {
        background: #2a5298;
        color: white;
        padding: 6px;
      }

      td {
        padding: 6px;
        border-bottom: 1px solid #eee;
      }

      .success {
        color: green;
        font-weight: bold;
      }

      .hidden {
        display: none;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body>
    <header>
      <img src="https://raw.githubusercontent.com/eduardoletelier1116-blip/app-pesaje-manzana/main/fondo-blanco.jpg" class="logo" alt="Fresh-Pak">
      Registro de Pesos
      <div class="codigo-empresa">R02 POE 29</div>
    </header>

    <div class="container">
      <!-- Formulario de Login -->
      <div class="card" id="loginCard">
        <h3>Ingreso</h3>
        <input type="text" id="nombreOperador" placeholder="Nombre operador">
        <input type="password" id="claveOperador" placeholder="Clave operador">
        <button onclick="ingresarOperador()">Operador</button>
        <p id="msgLogin" style="color:red;"></p>
      </div>

      <!-- Formulario de Registro de Pesos (escondido inicialmente) -->
      <div class="card hidden" id="formCard">
        <h3>Nuevo Registro</h3>
        <form id="form">
          <input type="text" id="operador" readonly>
          <select id="exportadora" required>
            <option value="">Exportadora</option>
            <option>Fruclem</option>
            <option>SK Gyan</option>
            <option>JHB</option>
            <option>Talamaya</option>
          </select>
          <select id="categoria" required>
            <option value="">Categoría</option>
            <option>Premium</option>
            <option>Extra</option>
            <option>Fancy</option>
            <option>Choice</option>
            <option>Granel</option>
          </select>
          <select id="variedad" required>
            <option value="">Variedad</option>
            <option>Royal Gala</option>
            <option>Red Delicious</option>
            <option>Granny</option>
            <option>Fuji</option>
            <option>Pink Lady</option>
          </select>
          <select id="salida" required>
            <option value="">Salida</option>
          </select>
          <input type="text" id="calibre" placeholder="Calibre" required>
          <input type="text" id="lote" placeholder="Lote">
          <input type="number" step="0.01" id="peso" placeholder="Peso (kg)" required>
          <button type="submit">Guardar</button>
          <p id="msg" class="success"></p>
        </form>
      </div>

      <!-- Tabla de Registros -->
      <div class="card" id="registrosCard">
        <h3>Registros</h3>
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Hora</th>
              <th>Usuario</th>
              <th>Exportadora</th>
              <th>Salida</th>
              <th>Calibre</th>
              <th>Categoria</th>
              <th>Variedad</th>
              <th>Lote</th>
              <th>Peso</th>
            </tr>
          </thead>
          <tbody id="tabla"></tbody>
        </table>
      </div>

      <!-- Gráfico de Progreso de Peso por Calibre -->
      <div class="card">
        <h3>Progreso de Peso por Calibre</h3>
        <canvas id="pesoChart" width="800" height="400"></canvas>
      </div>
    </div>

    <script>
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwEWxdRCwj549evEfZ47u6m2uDKj08gAvKN5zlUd67axC9kbmOVrx-Xd3O7hCggPErL/exec";

      // Cargar los registros cuando la página cargue
      window.addEventListener("load", function () {
        cargarRegistros();
      });

      // Función para ingresar al sistema (login)
      function ingresarOperador() {
        const nombre = document.getElementById("nombreOperador").value.trim();
        const clave = document.getElementById("claveOperador").value.trim();

        if (!nombre || !clave) {
          document.getElementById("msgLogin").innerText = "Ingrese nombre y clave";
          return;
        }

        if (clave === "fresh") { // Puedes cambiar "fresh" por la clave correcta
          operadorData.operador = nombre;
          document.getElementById("operador").value = operadorData.operador;

          // Ocultar el login y mostrar los formularios de registro y registros
          document.getElementById("loginCard").classList.add("hidden");
          document.getElementById("formCard").classList.remove("hidden");
          document.getElementById("registrosCard").classList.remove("hidden");
          document.getElementById("salida").focus();

          cargarRegistros();  // Cargar los registros del día
        } else {
          document.getElementById("msgLogin").innerText = "Clave incorrecta";
        }
      }

      // Función para cargar los registros desde Google Sheets
      function cargarRegistros() {
        fetch(SCRIPT_URL)
          .then(res => res.json())
          .then(data => {
            const tbody = document.getElementById("tabla");
            tbody.innerHTML = "";

            const registrosFiltrados = filtrarRegistrosPorDia(data);

            if (registrosFiltrados.length === 0) {
              tbody.innerHTML = `<tr><td colspan="10">No hay registros para hoy.</td></tr>`;
            } else {
              registrosFiltrados.reverse().forEach(row => {
                tbody.innerHTML += `
                  <tr>
                    <td>${row[0]}</td>  <!-- Fecha -->
                    <td>${row[1]}</td>  <!-- Hora -->
                    <td>${row[2]}</td>  <!-- Operador -->
                    <td>${row[3]}</td>  <!-- Exportadora -->
                    <td>${row[4]}</td>  <!-- Salida -->
                    <td>${row[5]}</td>  <!-- Calibre -->
                    <td>${row[6]}</td>  <!-- Categoría -->
                    <td>${row[7]}</td>  <!-- Variedad -->
                    <td>${row[8]}</td>  <!-- Lote -->
                    <td>${row[9]}</td>  <!-- Peso -->
                  </tr>
                `;
              });
              actualizarGrafico(registrosFiltrados);  // Actualizamos el gráfico con los datos filtrados
            }
          })
          .catch(err => console.error("Error cargando registros:", err));
      }

      // Función para filtrar los registros por la fecha de hoy
      function filtrarRegistrosPorDia(registros) {
        const hoy = new Date();
        const fechaHoy = hoy.toISOString().split("T")[0];  // Formato yyyy-mm-dd

        return registros.filter(row => {
          const fechaRegistro = row[0];  // La fecha del registro (formato dd/MM/yyyy)
          const [day, month, year] = fechaRegistro.split("/");  // Separamos la fecha por '/'
          const fechaFormatoCorrecto = `${year}-${month}-${day}`;  // Convertimos a formato yyyy-MM-dd

          return fechaFormatoCorrecto === fechaHoy;  // Comparamos solo las fechas sin la hora
        });
      }

      // Función para actualizar el gráfico con los registros filtrados
      function actualizarGrafico(registros) {
        const calibres = [];
        const pesos = {};
        const fechas = [];

        // Definir un conjunto de colores para los calibres
        const colores = [
          'rgba(75, 192, 192, 1)',  // Color para el primer calibre
          'rgba(153, 102, 255, 1)',  // Segundo color
          'rgba(255, 159, 64, 1)',  // Tercer color
          'rgba(54, 162, 235, 1)',  // Cuarto color
          'rgba(255, 99, 132, 1)',  // Quinto color
          'rgba(255, 205, 86, 1)',  // Sexto color
          'rgba(231, 76, 60, 1)',  // Séptimo color
          'rgba(46, 204, 113, 1)', // Octavo color
        ];

        registros.forEach(row => {
          const calibre = row[5];  // Calibre
          const peso = parseFloat(row[9]);  // Peso
          const fecha = row[0];  // Fecha

          if (!calibres.includes(calibre)) {
            calibres.push(calibre);
          }

          if (!pesos[calibre]) {
            pesos[calibre] = [];
            fechas.push(fecha);
          }

          pesos[calibre].push(peso);
        });

        // Ordenar los calibres de menor a mayor
        calibres.sort((a, b) => a - b);

        // Asignar un color a cada calibre y preparar los datasets
        const datasets = calibres.map((calibre, index) => ({
          label: calibre,
          data: pesos[calibre],  // Los pesos por calibre
          borderColor: colores[index % colores.length],  // Asignar color
          fill: false,  // No rellenar el área bajo la línea
          tension: 0.1   // Para suavizar la línea
        }));

        // Crear el gráfico de líneas
        const ctx = document.getElementById('pesoChart').getContext('2d');
        const pesoChart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: fechas,  // Fechas
            datasets: datasets  // Datos de cada calibre
          },
          options: {
            responsive: true,
            scales: {
              x: {
                beginAtZero: true,
                title: {
                  display: true,
                  text: 'Fecha'
                }
              },
              y: {
                title: {
                  display: true,
                  text: 'Peso (kg)'
                }
              }
            }
          }
        });
      }
    </script>
  </body>
</html>
