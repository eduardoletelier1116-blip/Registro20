<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Registro de Pesos por Calibre</title>
    <style>
      body {
        font-family: Segoe UI;
        margin: 0;
        background: #f4f6f9;
      }

      header {
        background: #1e3c72;
        color: white;
        padding: 20px;
        text-align: center;
        font-size: 22px;
        position: relative;
      }

      .logo {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        height: 50px;
      }

      .codigo-empresa {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 14px;
        font-weight: 500;
      }

      .container {
        max-width: 1200px;
        margin: 20px auto;
        padding: 20px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        margin-bottom: 20px;
      }

      input,
      select {
        width: 100%;
        padding: 8px;
        margin: 5px 0;
        border-radius: 6px;
        border: 1px solid #ddd;
      }

      button {
        background: #2a5298;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #1e3c72;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      th {
        background: #2a5298;
        color: white;
        padding: 6px;
      }

      td {
        padding: 6px;
        border-bottom: 1px solid #eee;
      }

      .success {
        color: green;
        font-weight: bold;
      }

      .hidden {
        display: none;
      }

      /* Estilos del gráfico */
      #chart_div {
        width: 100%;
        height: 400px;
      }
    </style>

    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  </head>

  <body>
    <header>
      <img src="https://raw.githubusercontent.com/eduardoletelier1116-blip/app-pesaje-manzana/main/fondo-blanco.jpg" class="logo" alt="Fresh-Pak">
      Registro de Pesos por Calibre
      <div class="codigo-empresa">R02 POE 29</div>
    </header>

    <div class="container">
      <div class="card" id="loginCard">
        <h3>Ingreso</h3>
        <input type="text" id="nombreOperador" placeholder="Nombre operador">
        <input type="password" id="claveOperador" placeholder="Clave operador">
        <button onclick="ingresarOperador()">Operador</button>
        <p id="msgLogin" style="color:red;"></p>
      </div>

      <div class="card hidden" id="formCard">
        <h3>Nuevo Registro</h3>
        <form id="form">
          <input type="text" id="operador" readonly>
          <select id="exportadora" required>
            <option value="">Exportadora</option>
            <option>Fruclem</option>
            <option>SK Gyan</option>
            <option>JHB</option>
            <option>Talamaya</option>
          </select>
          <select id="categoria" required>
            <option value="">Categoría</option>
            <option>Premium</option>
            <option>Extra</option>
            <option>Fancy</option>
            <option>Choice</option>
            <option>Granel</option>
          </select>
          <select id="variedad" required>
            <option value="">Variedad</option>
            <option>Royal Gala</option>
            <option>Red Delicious</option>
            <option>Granny</option>
            <option>Fuji</option>
            <option>Pink Lady</option>
          </select>
          <select id="salida" required>
            <option value="">Salida</option>
          </select>
          <input type="text" id="calibre" placeholder="Calibre" required>
          <input type="text" id="lote" placeholder="Lote">
          <input type="number" step="0.01" id="peso" placeholder="Peso (kg)" required>
          <button type="submit">Guardar</button>
          <p id="msg" class="success"></p>
        </form>
      </div>

      <div class="card" id="registrosCard">
        <h3>Registros</h3>
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Hora</th>
              <th>Usuario</th>
              <th>Exportadora</th>
              <th>Salida</th>
              <th>Calibre</th>
              <th>Categoria</th>
              <th>Variedad</th>
              <th>Lote</th>
              <th>Peso</th>
            </tr>
          </thead>
          <tbody id="tabla"></tbody>
        </table>
      </div>

      <div class="card">
        <h3>Gráfico de Evolución del Peso por Calibre</h3>
        <div id="chart_div"></div>
      </div>
    </div>

    <script>
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw-mSmXg9eDsZ0qg4rXbbGjL825q3XMpOru0swpVuEHhMQlCWlznj1y7dIoiOy8z1Yq/exec";
      const salidaSelect = document.getElementById("salida");

      for (let i = 1; i <= 41; i++) {
        let option = document.createElement("option");
        option.value = i;
        option.text = i;
        salidaSelect.appendChild(option);
      }

      let operadorData = {
        operador: "",
        exportadora: "",
        variedad: "",
        lote: ""
      };

      let historialPesos = {};  // Para almacenar los pesos por calibre y día

      // Función para obtener los registros del día
      function filtrarRegistrosPorDia(registros) {
        const hoy = new Date();
        const fechaHoy = formatDate(hoy); // Obtener la fecha de hoy en formato yyyy-MM-dd

        console.log("Fecha de hoy:", fechaHoy);  // Depuración

        // Imprimir todos los registros para verificar las fechas
        registros.forEach(row => {
          console.log("Registro:", row[0], " - Fecha formateada:", formatDate(row[0])); // Verificar cada fecha
        });

        // Filtrar los registros que coinciden con la fecha de hoy
        return registros.filter(row => formatDate(row[0]) === fechaHoy);
      }

      // Convertir la fecha a formato yyyy-MM-dd
      function formatDate(date) {
        if (date instanceof Date) {
          const day = String(date.getDate()).padStart(2, '0');
          const month = String(date.getMonth() + 1).padStart(2, '0');
          const year = date.getFullYear();
          return `${year}-${month}-${day}`;
        }

        if (typeof date === 'string' && date.includes('/')) {
          const parts = date.split('/');
          const day = String(parts[0]).padStart(2, '0');
          const month = String(parts[1]).padStart(2, '0');
          const year = parts[2];
          return `${year}-${month}-${day}`;
        }

        return date;
      }

      // Dibujar gráfico para el calibre seleccionado
      function dibujarGrafico(calibreSeleccionado) {
        google.charts.load('current', {'packages':['corechart', 'line']});
        google.charts.setOnLoadCallback(function() {
          var data = new google.visualization.DataTable();
          data.addColumn('number', 'Registro');
          data.addColumn('number', 'Peso (kg)');

          // Obtener registros del calibre seleccionado
          const registros = historialPesos[calibreSeleccionado] || [];

          console.log("Registros para el calibre:", calibreSeleccionado, registros);  // Depuración

          if (registros.length === 0) {
            document.getElementById('chart_div').innerHTML = 'No hay registros para este calibre hoy.';
            return;
          }

          // Añadir los registros al gráfico
          registros.forEach((registro, index) => {
            data.addRow([index + 1, registro.peso]); // El índice + 1 será el "registro"
          });

          var options = {
            title: `Evolución del Peso para el Calibre ${calibreSeleccionado}`,
            hAxis: {
              title: 'Número de Registro',
            },
            vAxis: {
              title: 'Peso (kg)',
            },
            chartArea: { width: '80%', height: '70%' },
            series: {
              0: { pointShape: 'circle', pointSize: 6 }
            }
          };

          var chart = new google.visualization.LineChart(document.getElementById('chart_div'));
          chart.draw(data, options);
        });
      }

      window.addEventListener("load", function () {
        cargarRegistros();
      });

      function ingresarOperador() {
        const nombre = document.getElementById("nombreOperador").value.trim();
        const clave = document.getElementById("claveOperador").value.trim();

        if (!nombre || !clave) {
          document.getElementById("msgLogin").innerText = "Ingrese nombre y clave";
          return;
        }

        if (clave === "fresh") {
          operadorData.operador = nombre;
          document.getElementById("operador").value = operadorData.operador;

          document.getElementById("loginCard").classList.add("hidden");
          document.getElementById("registrosCard").classList.remove("hidden");
          document.getElementById("formCard").classList.remove("hidden");
          document.getElementById("app").classList.remove("hidden");
          document.getElementById("salida").focus();

          cargarRegistros();
        } else {
          document.getElementById("msgLogin").innerText = "Clave incorrecta";
        }
      }

      document.getElementById("form").addEventListener("submit", function (e) {
        e.preventDefault();

        const data = {
          operador: operadorData.operador,
          exportadora: document.getElementById("exportadora").value,
          salida: document.getElementById("salida").value,
          calibre: document.getElementById("calibre").value,
          categoria: document.getElementById("categoria").value,
          variedad: document.getElementById("variedad").value,
          lote: document.getElementById("lote").value,
          peso: document.getElementById("peso").value
        };

        console.log("Datos a enviar:", data);  // Depuración

        fetch(SCRIPT_URL, {
          method: "POST",
          body: new URLSearchParams(data)
        })
          .then(res => res.json())
          .then(() => {
            document.getElementById("msg").innerText = "Guardado correctamente";

            // Actualizar historial de pesos por calibre
            if (!historialPesos[data.calibre]) {
              historialPesos[data.calibre] = [];
            }
            historialPesos[data.calibre].push({
              peso: data.peso
            });

            // Actualizar el gráfico para el calibre ingresado
            dibujarGrafico(data.calibre);
          })
          .catch(err => console.error("Error guardando:", err));
      });

      function cargarRegistros() {
        fetch(SCRIPT_URL)
          .then(res => res.json())
          .then(data => {
            const tbody = document.getElementById("tabla");
            tbody.innerHTML = "";

            const registrosFiltrados = filtrarRegistrosPorDia(data);

            console.log("Registros filtrados para hoy:", registrosFiltrados);  // Depuración

            if (registrosFiltrados.length === 0) {
              tbody.innerHTML = `<tr><td colspan="10">No hay registros para hoy.</td></tr>`;
            } else {
              registrosFiltrados.reverse().forEach(row => {
                tbody.innerHTML += `
                  <tr>
                    <td>${row[0]}</td>
                    <td>${row[1]}</td>
                    <td>${row[2]}</td>
                    <td>${row[3]}</td>
                    <td>${row[4]}</td>
                    <td>${row[5]}</td>
                    <td>${row[6]}</td>
                    <td>${row[7]}</td>
                    <td>${row[8]}</td>
                    <td>${row[9]}</td>
                  </tr>
                `;
              });

              // Llamamos a la función para dibujar el gráfico para cada calibre
              const calibresRegistrados = [...new Set(registrosFiltrados.map(row => row[5]))];
              calibresRegistrados.forEach(calibre => dibujarGrafico(calibre));
            }
          })
          .catch(err => console.error("Error cargando registros:", err));
      }
    </script>
  </body>
</html>
