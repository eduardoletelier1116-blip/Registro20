<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Registro de Pesos</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#f4f6f9;
}

header{
background:#1e3c72;
color:white;
padding:20px;
text-align:center;
font-size:22px;
position:relative;
}

.logo{
position:absolute;
left:20px;
top:50%;
transform:translateY(-50%);
height:50px;
}

.codigo-empresa{
position:absolute;
right:20px;
top:50%;
transform:translateY(-50%);
font-size:14px;
}

.container{
max-width:1200px;
margin:20px auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
margin-bottom:20px;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
border-radius:6px;
border:1px solid #ddd;
}

button{
background:#2a5298;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1e3c72;
}

.btn-peligro{
background:#c0392b;
}

.row-3{
display:grid;
grid-template-columns:1fr 1fr 1fr auto;
gap:10px;
align-items:end;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th{
background:#2a5298;
color:white;
padding:6px;
}

td{
padding:6px;
border-bottom:1px solid #eee;
}

.hidden{
display:none;
}

.chart-container{
position:relative;
width:100%;
height:450px;
}

.estado-sync{
font-size:12px;
color:#666;
margin-top:8px;
}

.info-objetivos{
font-size:12px;
margin-top:10px;
}

</style>
</head>

<body>

<header>

<img src="https://raw.githubusercontent.com/eduardoletelier1116-blip/app-pesaje-manzana/main/fondo-blanco.jpg" class="logo">

Registro de Pesos

<div class="codigo-empresa">R02 POE 29</div>

</header>

<div class="container">

<div class="card" id="loginCard">

<h3>Ingreso</h3>

<input type="text" id="nombreOperador" placeholder="Nombre operador">

<input type="password" id="claveOperador" placeholder="Clave operador">

<button onclick="ingresarOperador()">Operador</button>

<p id="msgLogin" style="color:red;"></p>

</div>


<div class="card hidden" id="objetivosCard">

<h3>Objetivos del turno</h3>

<div class="row-3">

<div>
<label>Calibre desde</label>
<input type="number" id="calibreDesde">
</div>

<div>
<label>Calibre hasta</label>
<input type="number" id="calibreHasta">
</div>

<div>
<label>Peso objetivo</label>
<input type="text" id="pesoObjetivo" placeholder="19.1 o 19,1">
</div>

<div>
<button onclick="agregarReglaObjetivo()">Agregar</button>
</div>

</div>

<table>

<thead>

<tr>
<th>Desde</th>
<th>Hasta</th>
<th>Objetivo</th>
<th></th>
</tr>

</thead>

<tbody id="tablaObjetivos"></tbody>

</table>

<button class="btn-peligro" onclick="limpiarObjetivos()">Limpiar reglas</button>

</div>


<div class="card hidden" id="formCard">

<h3>Nuevo Registro</h3>

<form id="form">

<input type="text" id="operador" readonly>

<select id="exportadora" required>
<option value="">Exportadora</option>
<option>Fruclem</option>
<option>SK Gyan</option>
<option>JHB</option>
<option>Talamaya</option>
</select>

<select id="categoria" required>
<option value="">Categoría</option>
<option>Premium</option>
<option>Extra</option>
<option>Fancy</option>
<option>Choice</option>
<option>Granel</option>
<option>CEM</option>
</select>

<select id="variedad" required>
<option value="">Variedad</option>
<option>Royal Gala</option>
<option>Red Delicious</option>
<option>Granny</option>
<option>Fuji</option>
<option>Pink Lady</option>
</select>

<select id="salida">
<option value="">Salida</option>
</select>

<input type="text" id="calibre" placeholder="Calibre">

<input type="text" id="lote" placeholder="Lote">

<input type="number" step="0.01" id="peso" placeholder="Peso">

<button type="submit">Guardar</button>

<p id="msg" style="color:green;"></p>

</form>

</div>


<div class="card">

<h3>Registros</h3>

<table>

<thead>

<tr>
<th>Fecha</th>
<th>Hora</th>
<th>Usuario</th>
<th>Exportadora</th>
<th>Salida</th>
<th>Calibre</th>
<th>Categoria</th>
<th>Variedad</th>
<th>Lote</th>
<th>Peso</th>
</tr>

</thead>

<tbody id="tabla"></tbody>

</table>

<div id="estadoSync" class="estado-sync"></div>

</div>


<div class="card">

<h3>Seguimiento de pesos por calibre</h3>

<div class="chart-container">
<canvas id="graficoPesos"></canvas>
</div>

<div id="infoObjetivos" class="info-objetivos"></div>

</div>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwEWxdRCwj549evEfZ47u6m2uDKj08gAvKN5zlUd67axC9kbmOVrx-Xd3O7hCggPErL/exec";

let grafico=null;
let reglasObjetivo=[];

function normalizarNumero(v){
return parseFloat(String(v).replace(",","."));
}

function agregarReglaObjetivo(){

let desde=parseInt(calibreDesde.value);
let hasta=parseInt(calibreHasta.value);
let objetivo=normalizarNumero(pesoObjetivo.value);

if(isNaN(desde)||isNaN(hasta)||isNaN(objetivo))return;

reglasObjetivo.push({
desde:desde,
hasta:hasta,
objetivo:objetivo
});

localStorage.setItem("reglasObjetivoTurno",JSON.stringify(reglasObjetivo));

renderTablaObjetivos();
cargarRegistros();

calibreDesde.value="";
calibreHasta.value="";
pesoObjetivo.value="";

}

function limpiarObjetivos(){

reglasObjetivo=[];
localStorage.removeItem("reglasObjetivoTurno");

renderTablaObjetivos();
cargarRegistros();

}

function renderTablaObjetivos(){

tablaObjetivos.innerHTML="";

reglasObjetivo.forEach((r,i)=>{

tablaObjetivos.innerHTML+=`

<tr>

<td>${r.desde}</td>
<td>${r.hasta}</td>
<td>${r.objetivo}</td>

<td>

<button class="btn-peligro" onclick="eliminarRegla(${i})">

Eliminar

</button>

</td>

</tr>

`;

});

}

function eliminarRegla(i){

reglasObjetivo.splice(i,1);

localStorage.setItem("reglasObjetivoTurno",JSON.stringify(reglasObjetivo));

renderTablaObjetivos();
cargarRegistros();

}

function obtenerObjetivo(calibre){

let c=parseInt(calibre);

for(let r of reglasObjetivo){

if(c>=r.desde && c<=r.hasta){
return r.objetivo;
}

}

return null;

}

function actualizarGrafico(data){

if(!data.length)return;

let grupos={};

data.forEach(r=>{

let calibre=r[5];
let peso=normalizarNumero(r[9]);

if(!grupos[calibre])grupos[calibre]=[];

grupos[calibre].push(peso);

});

let labels=[];
let datasets=[];

let max=Math.max(...Object.values(grupos).map(a=>a.length));

for(let i=1;i<=max;i++){
labels.push("Caja "+i);
}

let index=0;

for(let calibre in grupos){

let pesos=grupos[calibre];

datasets.push({

label:"Calibre "+calibre+" Real",

data:pesos,

borderColor:`hsl(${index*60},70%,40%)`,
backgroundColor:`hsl(${index*60},70%,40%)`,
tension:0.25

});

let objetivo=obtenerObjetivo(calibre);

if(objetivo!==null){

datasets.push({

label:"Calibre "+calibre+" Objetivo",

data:Array(pesos.length).fill(objetivo),

borderColor:`hsl(${index*60},70%,40%)`,
borderDash:[6,6],
pointRadius:0

});

}

index++;

}

if(grafico)grafico.destroy();

grafico=new Chart(graficoPesos,{

type:"line",

data:{
labels:labels,
datasets:datasets
},

options:{
responsive:true,
animation:false
}

});

}

function actualizarTabla(data){

tabla.innerHTML="";

data.reverse().forEach(r=>{

tabla.innerHTML+=`

<tr>

<td>${r[0]}</td>
<td>${r[1]}</td>
<td>${r[2]}</td>
<td>${r[3]}</td>
<td>${r[4]}</td>
<td>${r[5]}</td>
<td>${r[6]}</td>
<td>${r[7]}</td>
<td>${r[8]}</td>
<td>${r[9]}</td>

</tr>

`;

});

}

function cargarRegistros(){

fetch(SCRIPT_URL+"?t="+Date.now())

.then(r=>r.json())

.then(data=>{

actualizarTabla(data);
actualizarGrafico(data);

estadoSync.innerText="Actualizado "+new Date().toLocaleTimeString();

});

}

setInterval(cargarRegistros,3000);

window.onload=function(){

let guardado=localStorage.getItem("reglasObjetivoTurno");

if(guardado)reglasObjetivo=JSON.parse(guardado);

renderTablaObjetivos();

for(let i=1;i<=41;i++){

let o=document.createElement("option");
o.value=i;
o.text=i;

salida.appendChild(o);

}

cargarRegistros();

}

function ingresarOperador(){

let nombre=nombreOperador.value.trim();
let clave=claveOperador.value.trim();

if(clave!=="fresh"){
msgLogin.innerText="Clave incorrecta";
return;
}

operador.value=nombre;

loginCard.classList.add("hidden");
formCard.classList.remove("hidden");
objetivosCard.classList.remove("hidden");

}

form.addEventListener("submit",function(e){

e.preventDefault();

let data={
operador:operador.value,
exportadora:exportadora.value,
salida:salida.value,
calibre:calibre.value,
categoria:categoria.value,
variedad:variedad.value,
lote:lote.value,
peso:peso.value
};

fetch(SCRIPT_URL,{
method:"POST",
body:new URLSearchParams(data)
})

.then(()=>{

msg.innerText="Guardado";

calibre.value="";
peso.value="";
salida.value="";

setTimeout(()=>msg.innerText="",1500);

});

});

</script>

</body>
</html>
