<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Registro de Pesos</title>
    <style>
      body {
        font-family: Segoe UI;
        margin: 0;
        background: #f4f6f9;
      }

      header {
        background: #1e3c72;
        color: white;
        padding: 20px;
        text-align: center;
        font-size: 22px;
        position: relative;
      }

      .logo {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        height: 50px;
      }

      .codigo-empresa {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 14px;
        font-weight: 500;
      }

      .container {
        max-width: 1200px;
        margin: 20px auto;
        padding: 20px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        margin-bottom: 20px;
      }

      input,
      select {
        width: 100%;
        padding: 8px;
        margin: 5px 0;
        border-radius: 6px;
        border: 1px solid #ddd;
      }

      button {
        background: #2a5298;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #1e3c72;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      th {
        background: #2a5298;
        color: white;
        padding: 6px;
      }

      td {
        padding: 6px;
        border-bottom: 1px solid #eee;
      }

      .success {
        color: green;
        font-weight: bold;
      }

      .hidden {
        display: none;
      }

      /* Flexbox para que el gráfico esté junto al login */
      .login-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
      }

      .login-card, .grafico-card {
        width: 45%;
      }

      /* Estilos adicionales para mostrar el peso */
      .peso-card {
        background: white;
        padding: 10px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        margin-top: 20px;
        text-align: center;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body>
    <header>
      <img src="https://raw.githubusercontent.com/eduardoletelier1116-blip/app-pesaje-manzana/main/fondo-blanco.jpg" class="logo" alt="Fresh-Pak">
      Registro de Pesos
      <div class="codigo-empresa">R02 POE 29</div>
    </header>

    <div class="container">
      <div class="login-container">
        <div class="login-card">
          <h3>Ingreso</h3>
          <input type="text" id="nombreOperador" placeholder="Nombre operador">
          <input type="password" id="claveOperador" placeholder="Clave operador">
          <button onclick="ingresarOperador()">Operador</button>
          <p id="msgLogin" style="color:red;"></p>
        </div>

        <div class="grafico-card">
          <canvas id="graficoCalibres" width="400" height="200"></canvas>
        </div>
      </div>

      <div class="peso-card">
        <h4>Peso Registrado Hoy</h4>
        <p id="pesoRegistrado">0 kg</p>
      </div>

      <div class="card" id="registrosCard">
        <h3>Registros</h3>
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Hora</th>
              <th>Usuario</th>
              <th>Exportadora</th>
              <th>Salida</th>
              <th>Calibre</th>
              <th>Categoria</th>
              <th>Variedad</th>
              <th>Lote</th>
              <th>Peso</th>
            </tr>
          </thead>
          <tbody id="tabla"></tbody>
        </table>
      </div>
    </div>

    <script>
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwEWxdRCwj549evEfZ47u6m2uDKj08gAvKN5zlUd67axC9kbmOVrx-Xd3O7hCggPErL/exec";

      function obtenerRegistrosDelDia() {
        fetch(SCRIPT_URL)
          .then(response => response.json())
          .then(data => {
            const fechaHoy = new Date().toISOString().split('T')[0]; // Formato YYYY-MM-DD
            const registrosDelDia = data.filter(item => {
              const [dia, mes, anio] = item[0].split("/"); // Suponiendo que la fecha está en formato dd/MM/yyyy
              const fechaItem = `${anio}-${mes}-${dia}`; // Formato YYYY-MM-DD
              return fechaItem === fechaHoy; // Comparar con la fecha de hoy
            });

            const calibres = registrosDelDia.map(item => item[5]); // El calibre está en la columna 6 (índice 5)
            const cantidadPorCalibre = {};

            calibres.forEach(calibre => {
              cantidadPorCalibre[calibre] = (cantidadPorCalibre[calibre] || 0) + 1;
            });

            const etiquetas = Object.keys(cantidadPorCalibre);
            const cantidades = Object.values(cantidadPorCalibre);

            // Mostrar el peso total del día
            const pesoTotal = registrosDelDia.reduce((sum, item) => sum + parseFloat(item[9]), 0);
            document.getElementById('pesoRegistrado').innerText = `${pesoTotal.toFixed(2)} kg`;

            actualizarGrafico(etiquetas, cantidades);
          })
          .catch(error => console.error("Error al obtener registros:", error));
      }

      function actualizarGrafico(etiquetas, cantidades) {
        const ctx = document.getElementById('graficoCalibres').getContext('2d');
        
        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: etiquetas,
            datasets: [{
              label: 'Cantidad de Calibres',
              data: cantidades,
              backgroundColor: 'rgba(54, 162, 235, 0.2)',
              borderColor: 'rgba(54, 162, 235, 1)',
              borderWidth: 1
            }]
          },
          options: {
            responsive: true,
            scales: {
              y: {
                beginAtZero: true
              }
            }
          }
        });
      }

      window.onload = function () {
        obtenerRegistrosDelDia(); // Cargar datos y mostrar el gráfico
      };
    </script>
  </body>
</html>
