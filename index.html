<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Registro de Pesos</title>
    <style>
      body {
        font-family: Segoe UI;
        margin: 0;
        background: #f4f6f9;
      }

      header {
        background: #1e3c72;
        color: white;
        padding: 20px;
        text-align: center;
        font-size: 22px;
        position: relative;
      }

      .logo {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        height: 50px;
      }

      .codigo-empresa {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 14px;
        font-weight: 500;
      }

      .container {
        max-width: 1200px;
        margin: 20px auto;
        padding: 20px;
        display: flex;
        justify-content: space-between;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        margin-bottom: 20px;
      }

      .chart-container {
        width: 55%;
        height: 300px;
      }

      .login-container {
        width: 40%;
      }

      input, select {
        width: 100%;
        padding: 8px;
        margin: 5px 0;
        border-radius: 6px;
        border: 1px solid #ddd;
      }

      button {
        background: #2a5298;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #1e3c72;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      th {
        background: #2a5298;
        color: white;
        padding: 6px;
      }

      td {
        padding: 6px;
        border-bottom: 1px solid #eee;
      }

      .success {
        color: green;
        font-weight: bold;
      }

      .hidden {
        display: none;
      }
    </style>
    <!-- Agregar Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body>
    <header>
      <img src="https://raw.githubusercontent.com/eduardoletelier1116-blip/app-pesaje-manzana/main/fondo-blanco.jpg" class="logo" alt="Fresh-Pak">
      Registro de Pesos
      <div class="codigo-empresa">R02 POE 29</div>
    </header>

    <div class="container">
      <div class="login-container">
        <div class="card" id="loginCard">
          <h3>Ingreso</h3>
          <input type="text" id="nombreOperador" placeholder="Nombre operador">
          <input type="password" id="claveOperador" placeholder="Clave operador">
          <button onclick="ingresarOperador()">Operador</button>
          <p id="msgLogin" style="color:red;"></p>
        </div>
      </div>

      <!-- Contenedor para el gráfico -->
      <div class="chart-container">
        <canvas id="pesoChart"></canvas>
      </div>
    </div>

    <div class="container">
      <div class="card" id="registrosCard">
        <h3>Registros</h3>
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Hora</th>
              <th>Usuario</th>
              <th>Exportadora</th>
              <th>Salida</th>
              <th>Calibre</th>
              <th>Categoria</th>
              <th>Variedad</th>
              <th>Lote</th>
              <th>Peso</th>
            </tr>
          </thead>
          <tbody id="tabla"></tbody>
        </table>
      </div>
    </div>

    <script>
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwEWxdRCwj549evEfZ47u6m2uDKj08gAvKN5zlUd67axC9kbmOVrx-Xd3O7hCggPErL/exec";
      
      // Inicializar el gráfico
      var ctx = document.getElementById('pesoChart').getContext('2d');
      var pesoChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: [], // Aquí se insertarán los calibres
          datasets: [{
            label: 'Peso (kg)',
            data: [], // Aquí se insertarán los pesos
            borderColor: '#2a5298',
            fill: false,
            tension: 0.1
          }]
        },
        options: {
          responsive: true,
          scales: {
            x: {
              title: {
                display: true,
                text: 'Calibre'
              }
            },
            y: {
              title: {
                display: true,
                text: 'Peso (kg)'
              }
            }
          }
        }
      });

      // Filtra los registros para el día de hoy
      function filtrarRegistrosPorDia(registros) {
        const hoy = new Date();
        const fechaHoy = hoy.toISOString().split('T')[0]; // Formato YYYY-MM-DD

        return registros.filter(row => row[0].split('T')[0] === fechaHoy); // Filtra por fecha
      }

      // Cargar registros y actualizar gráfico
      function cargarRegistros() {
        fetch(SCRIPT_URL)
          .then(res => res.json())
          .then(data => {
            const registrosFiltrados = filtrarRegistrosPorDia(data);
            const calibres = registrosFiltrados.map(row => row[5]); // Calibre
            const pesos = registrosFiltrados.map(row => row[9]); // Peso
            
            // Actualiza el gráfico con los datos filtrados
            pesoChart.data.labels = calibres;
            pesoChart.data.datasets[0].data = pesos;
            pesoChart.update();
          })
          .catch(err => console.error("Error cargando registros:", err));
      }

      window.addEventListener("load", function () {
        cargarRegistros();
      });

      function ingresarOperador() {
        const nombre = document.getElementById("nombreOperador").value.trim();
        const clave = document.getElementById("claveOperador").value.trim();

        if (!nombre || !clave) {
          document.getElementById("msgLogin").innerText = "Ingrese nombre y clave";
          return;
        }

        if (clave === "fresh") {
          document.getElementById("loginCard").classList.add("hidden");
          document.getElementById("registrosCard").classList.remove("hidden");
          cargarRegistros();
        } else {
          document.getElementById("msgLogin").innerText = "Clave incorrecta";
        }
      }
    </script>
  </body>
</html>
